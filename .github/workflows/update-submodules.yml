name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📦 BEFORE
      - name: Capture before state
        run: git submodule status --recursive > before.txt

      # 🔄 UPDATE
      - name: Update submodules
        run: git submodule update --init --recursive --remote

      # 📦 AFTER
      - name: Capture after state
        run: git submodule status --recursive > after.txt

      # 🧠 安全差分生成（HTMLは作らない）
      - name: Generate report data
        id: report
        shell: bash
        run: |
          REPORT=""

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo "$oldLine" | awk '{print $1}')
            newCommit=$(echo "$newLine" | awk '{print $1}')
            path=$(echo "$newLine" | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT="${REPORT}${path}|${oldCommit:0:7}|${newCommit:0:7};"
            fi
          done < before.txt 3< after.txt

          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      # 📊 判定
      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 💾 commit
      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "🔄 Auto update submodules"
          git push
           - name: Send mail
  if: steps.changes.outputs.changed == 'true'
  uses: actions/github-script@v7
  env:
    GMAIL_USER: ${{ secrets.GMAIL_USER }}
    GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
    REPORT: ${{ steps.report.outputs.REPORT }}
  with:
    script: |
      const nodemailer = require("nodemailer");

      const items = (process.env.REPORT || "")
        .split(";")
        .filter(Boolean)
        .map(line => {
          const [path, oldC, newC] = line.split("|");

          return `
            <div style="background:#fff;padding:14px;margin:10px 0;border-radius:10px">
              📦 <b>${path}</b><br/>
              🔄 <code>${oldC}</code> → <code>${newC}</code><br/>
              <a href="https://github.com/NEO1842/${path}/tree/${newC}">
                🔗 Open Submodule
              </a>
            </div>
          `;
        }).join("");

      const hasChanges = items.length > 0;

      const html = `
        <div style="font-family:Arial;background:#f6f7fb;padding:20px">
          <div style="max-width:720px;margin:auto">

            <h2 style="text-align:center">🔄 Submodule Update Report</h2>

            <div style="background:#fff;padding:16px;border-radius:10px;margin:15px 0;box-shadow:0 2px 6px rgba(0,0,0,0.08)">
              <p>🚦 Status:
                <b style="color:${hasChanges ? '#2ecc71' : '#999'}">
                  ${hasChanges ? 'UPDATED' : 'NO CHANGES'}
                </b>
              </p>

              <a href="https://github.com/${context.repo.owner}/${context.repo.repo}"
                 style="display:inline-block;margin-top:10px;padding:10px 16px;background:#2ecc71;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold">
                📦 Open Blender-Works
              </a>
            </div>

            <h3>📦 Submodules</h3>

            ${hasChanges ? items : `
              <div style="background:#fff;padding:14px;border-radius:10px;text-align:center;color:#999">
                ✨ No updates detected
              </div>
            `}

            <p style="text-align:center;color:#aaa;font-size:12px;margin-top:30px">
              GitHub Actions Auto Dashboard
            </p>

          </div>
        </div>
      `;

      const transporter = nodemailer.createTransport({
        service: "gmail",
        auth: {
          user: process.env.GMAIL_USER,
          pass: process.env.GMAIL_PASS
        }
      });

      await transporter.sendMail({
        from: process.env.GMAIL_USER,
        to: process.env.GMAIL_USER,
        subject: "🔄 Submodule Update Report",
        html
      });

      console.log("Mail sent!"); 
