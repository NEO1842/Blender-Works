name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Nodemailer
        run: npm install nodemailer

      - name: Save old submodule commits
        id: before
        run: |
          git submodule status --recursive > before.txt

      - name: Update submodules
        run: |
          git submodule update --init --recursive --remote

      - name: Save new submodule commits
        id: after
        run: |
          git submodule status --recursive > after.txt

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate update report
        if: steps.changes.outputs.changed == 'true'
        id: report
        shell: bash
        run: |
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo $oldLine | awk '{print $1}')
            newCommit=$(echo $newLine | awk '{print $1}')
            path=$(echo $newLine | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" ]]; then
              echo "<div style='padding:14px;margin:12px 0;background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08)'>" >> $GITHUB_OUTPUT
              echo "<h3>📦 $path</h3>" >> $GITHUB_OUTPUT
              echo "<p>🔄 <code>$oldCommit</code> → <code>$newCommit</code></p>" >> $GITHUB_OUTPUT
              echo "</div>" >> $GITHUB_OUTPUT
            fi

          done < before.txt 3< after.txt

          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Auto update submodules"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push

      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const html = `
            <div style="font-family:Arial;background:#f6f7fb;padding:20px">
              <div style="max-width:700px;margin:auto">

                <h2 style="text-align:center">
                  🔄 Submodule Update Report
                </h2>

                <hr />

                <div style="
                  background:#fff;
                  padding:16px;
                  border-radius:10px;
                  margin-bottom:20px;
                  box-shadow:0 2px 6px rgba(0,0,0,0.08)
                ">
                  <p>🕒 Workflow executed successfully.</p>

                  <p>
                    🔗
                    <a href="https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}">
                      Open GitHub Actions Run
                    </a>
                  </p>
                </div>

                ${process.env.REPORT}

                <p style="
                  text-align:center;
                  color:#999;
                  font-size:12px;
                  margin-top:30px;
                ">
                  GitHub Actions Auto Submodule Updater
                </p>

              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "🔄 Submodule Update Report",
              html
            });

            console.log("Mail sent!");
