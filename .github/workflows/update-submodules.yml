name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture before state
        run: git submodule status --recursive > before.txt

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      - name: Capture after state
        run: git submodule status --recursive > after.txt

      - name: Generate report data
        id: report
        shell: bash
        run: |
          REPORT=""

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo "$oldLine" | awk '{print $1}' | tr -d '+')
            newCommit=$(echo "$newLine" | awk '{print $1}' | tr -d '+')
            path=$(echo "$newLine" | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT="${REPORT}${path}|${oldCommit:0:7}|${newCommit:0:7};"
            fi
          done < before.txt 3< after.txt

          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "🔄 Auto update submodules"
          git push

      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const hasChanges = (process.env.REPORT || "").trim().length > 0;

            const items = (process.env.REPORT || "")
              .split(";")
              .filter(Boolean)
              .map(line => {
                const [path, oldC, newC] = line.split("|");

                return `
                  <div style="background:#fff;padding:14px;border-radius:12px;margin:10px 0">

                    <div style="text-align:center;font-size:20px;font-weight:bold">
                      🚦 Status: UPDATED
                    </div>

                    <div style="margin-top:10px;font-weight:bold">
                      📦 ${path}
                    </div>

                    <div style="margin-top:6px">
                      🔄 <code>${oldC}</code> → <code>${newC}</code>
                    </div>

                    <div style="text-align:center;margin-top:12px">
                      <a href="https://github.com/${context.repo.owner}/${path}/tree/${newC}"
                         style="padding:8px 12px;background:#3498db;color:#fff;
                                text-decoration:none;border-radius:8px;display:inline-block">
                        🔗 Open Submodule
                      </a>
                    </div>

                  </div>
                `;
              }).join("");

            const html = `
              <div style="font-family:Arial;background:#f6f7fb;padding:20px">
                <div style="max-width:720px;margin:auto">

                  <!-- TITLE -->
                  <div style="text-align:center;font-size:22px;font-weight:bold">
                    📦 Submodules
                  </div>

                  <div style="text-align:center;color:#999;margin:8px 0">
                    ────────────────────────────────────────────
                  </div>

                  <!-- STATUS -->
                  <div style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:12px">
                    🚦 Status: ${hasChanges ? 'UPDATED' : 'NO CHANGES'}
                  </div>

                  <!-- CONTENT -->
                  ${
                    hasChanges
                      ? items
                      : `<div style="background:#fff;padding:14px;border-radius:12px;text-align:center;color:#888">
                          ✨ No updates detected
                        </div>`
                  }

                </div>
              </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "🔄 Submodule Update Report",
              html
            });

            console.log("Mail sent!");
