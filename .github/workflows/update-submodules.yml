name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture before state
        run: git submodule status --recursive > before.txt

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      - name: Capture after state
        run: git submodule status --recursive > after.txt

      - name: Generate report data
        id: report
        shell: bash
        run: |
          REPORT=""

          paste before.txt after.txt | while read -r oldLine newLine; do
            oldCommit=$(echo "$oldLine" | awk '{print $1}' | tr -d '+')
            newCommit=$(echo "$newLine" | awk '{print $1}' | tr -d '+')
            path=$(echo "$newLine" | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT="${REPORT}${path}|${oldCommit:0:7}|${newCommit:0:7};"
            fi
          done

          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "🔄 Auto update submodules"
          git push

      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const items = (process.env.REPORT || "")
              .split(";")
              .filter(Boolean)
              .map(line => {
                const [path, oldC, newC] = line.split("|");

                const cleanOld = (oldC || "").replace("+","");
                const cleanNew = (newC || "").replace("+","");

                return `
                  <div style="
                    background:#fff;
                    padding:14px;
                    margin:12px 0;
                    border-radius:12px;
                    box-shadow:0 2px 6px rgba(0,0,0,0.06);
                    border:1px solid #eee;
                  ">

                    <div style="
                      text-align:center;
                      font-size:24px;
                      font-weight:bold;
                      margin-bottom:14px;
                    ">
                      🚦 Status: UPDATED
                    </div>

                    <div style="
                      font-weight:bold;
                      font-size:20px;
                    ">
                      📦 ${path}
                    </div>

                    <div style="
                      margin-top:6px;
                      color:#333;
                      font-size:19px;
                      font-weight:600;
                    ">
                      🔄 <code>${cleanOld}</code> → <code>${cleanNew}</code>
                    </div>

                    <a href="https://github.com/${context.repo.owner}/${path}/tree/${cleanNew}"
                       style="
                         display:inline-block;
                         margin-top:10px;
                         padding:8px 12px;
                         background:#3498db;
                         color:#fff;
                         text-decoration:none;
                         border-radius:8px;
                         font-size:12px;
                         font-weight:bold;
                       ">
                      🔗 Open Submodule
                    </a>

                  </div>
                `;
              }).join("");

            const hasChanges = (process.env.REPORT || "").trim().length > 0;

            const html = `
              <div style="font-family:Arial;background:#f6f7fb;padding:20px">
                <div style="max-width:720px;margin:auto">

                  <div style="
                    text-align:center;
                    font-size:24px;
                    font-weight:bold;
                    margin-bottom:14px;
                  ">
                    🚦 Status: ${hasChanges ? 'UPDATED' : 'NO CHANGES'}
                  </div>

                  <div style="
                    background:#fff;
                    padding:16px;
                    border-radius:12px;
                    margin:15px 0;
                    box-shadow:0 2px 6px rgba(0,0,0,0.08)
                  ">
                    <a href="https://github.com/${context.repo.owner}/${context.repo.repo}"
                       style="
                         display:inline-block;
                         margin-top:10px;
                         padding:10px 16px;
                         background:#2ecc71;
                         color:#fff;
                         text-decoration:none;
                         border-radius:10px;
                         font-weight:bold;
                       ">
                      📦 Open Blender-Works
                    </a>
                  </div>

                  <h3 style="
                    text-align:center;
                    font-size:22px;
                    margin:12px 0;
                  ">
                    📦 Submodules
                  </h3>

                  ${
                    hasChanges
                      ? items
                      : `<div style="background:#fff;padding:14px;border-radius:12px;text-align:center;color:#999">
                          ✨ No updates detected
                        </div>`
                  }

                  <p style="text-align:center;color:#aaa;font-size:12px;margin-top:30px">
                    GitHub Actions Auto Dashboard
                  </p>

                </div>
              </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "🔄 Submodule Update Report",
              html
            });

            console.log("Mail sent!");
