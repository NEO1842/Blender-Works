name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📦 BEFORE
      - name: Capture before state
        run: git submodule status --recursive > before.txt

      # 🔄 UPDATE
      - name: Update submodules
        run: git submodule update --init --recursive --remote

      # 📦 AFTER
      - name: Capture after state
        run: git submodule status --recursive > after.txt

      # 🧠 DIFF生成（完全安定版）
      - name: Generate report
        id: report
        shell: bash
        run: |
          REPORT=""

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo $oldLine | awk '{print $1}')
            newCommit=$(echo $newLine | awk '{print $1}')
            path=$(echo $newLine | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT+="
<div style='background:#fff;padding:14px;margin:10px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08)'>

📦 <b>$path</b><br/>

🔄 <code>${oldCommit:0:7}</code> → <code>${newCommit:0:7}</code><br/>

<a href='https://github.com/$path'
   style='display:inline-block;margin-top:8px;padding:6px 12px;background:#3498db;color:#fff;text-decoration:none;border-radius:6px;font-size:12px'>
   🔗 Open Submodule
</a>

</div>"
            fi

          done < before.txt 3< after.txt

          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 📊 CHANGE判定
      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 💾 commit
      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "🔄 Auto update submodules"
          git push

      # 💌 MAIL（All-Task風ダッシュボードUI）
      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const hasChanges = !!process.env.REPORT;

            const html = `
            <div style="font-family:Arial;background:#f6f7fb;padding:20px">
              <div style="max-width:720px;margin:auto">

                <h2 style="text-align:center">🔄 Submodule Update Report</h2>

                <!-- STATUS CARD -->
                <div style="background:#fff;padding:16px;border-radius:10px;margin:15px 0;box-shadow:0 2px 6px rgba(0,0,0,0.08)">

                  <p>🚦 Status:
                    <b style="color:${hasChanges ? '#2ecc71' : '#999'}">
                      ${hasChanges ? 'UPDATED' : 'NO CHANGES'}
                    </b>
                  </p>

                  <!-- MAIN BUTTON -->
                  <a href="https://github.com/${context.repo.owner}/${context.repo.repo}"
                     style="
                       display:inline-block;
                       margin-top:10px;
                       padding:10px 16px;
                       background:#2ecc71;
                       color:#fff;
                       text-decoration:none;
                       border-radius:8px;
                       font-weight:bold;
                     ">
                    📦 Open Blender-Works
                  </a>

                </div>

                <h3>📦 Submodules</h3>

                ${hasChanges ? process.env.REPORT : `
                  <div style="background:#fff;padding:14px;border-radius:10px;text-align:center;color:#999;box-shadow:0 2px 6px rgba(0,0,0,0.08)">
                    ✨ No updates detected
                  </div>
                `}

                <p style="text-align:center;color:#aaa;font-size:12px;margin-top:30px">
                  GitHub Actions Auto Dashboard
                </p>

              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "🔄 Submodule Update Report",
              html
            });

            console.log("Mail sent!");
