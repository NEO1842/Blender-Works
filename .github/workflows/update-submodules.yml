name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture before state
        run: git submodule status --recursive > before.txt

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      - name: Capture after state
        run: git submodule status --recursive > after.txt

      - name: Generate report data
        id: report
        shell: bash
        run: |
          REPORT=""

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo "$oldLine" | awk '{print $1}' | tr -d '+')
            newCommit=$(echo "$newLine" | awk '{print $1}' | tr -d '+')
            path=$(echo "$newLine" | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT="${REPORT}${path}|${oldCommit:0:7}|${newCommit:0:7};"
            fi
          done < before.txt 3< after.txt

          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "🔄 Auto update submodules"
          git push

      - name: Install nodemailer
        if: steps.changes.outputs.changed == 'true'
        run: npm install nodemailer

      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const entries = (process.env.REPORT || "").split(";").filter(Boolean);
            const hasChanges = entries.length > 0;
            const today = new Date().toLocaleDateString("ja-JP", {
              year: "numeric", month: "long", day: "numeric",
              timeZone: "Asia/Tokyo"
            });
            const timeNow = new Date().toLocaleTimeString("ja-JP", {
              hour: "2-digit", minute: "2-digit",
              timeZone: "Asia/Tokyo"
            });

            const cards = entries.map((line, i) => {
              const [path, oldC, newC] = line.split("|");
              const repoName = path.split("/").pop();
              return `
                <tr>
                  <td style="padding: 0 0 16px 0;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0"
                      style="background: #ffffff; border-radius: 16px; border: 1.5px solid #e2e8f0;
                             box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden;">
                      <!-- カードヘッダー -->
                      <tr>
                        <td style="background: linear-gradient(135deg, #f8faff 0%, #eef3ff 100%);
                                   padding: 18px 24px; border-bottom: 1.5px solid #e2e8f0;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td>
                                <div style="font-size: 11px; color: #94a3b8; letter-spacing: 0.08em;
                                            text-transform: uppercase; margin-bottom: 4px; font-weight: 600;">
                                  SUBMODULE #${String(i + 1).padStart(2, "0")}
                                </div>
                                <div style="font-size: 18px; font-weight: 700; color: #1e293b;
                                            font-family: 'Courier New', monospace;">
                                  📦 ${repoName}
                                </div>
                                <div style="font-size: 12px; color: #64748b; margin-top: 2px;">
                                  ${path}
                                </div>
                              </td>
                              <td style="text-align: right; vertical-align: top;">
                                <span style="display: inline-block; background: linear-gradient(135deg, #22c55e, #16a34a);
                                             color: #fff; font-size: 11px; font-weight: 700; padding: 5px 14px;
                                             border-radius: 20px; letter-spacing: 0.06em;">
                                  ✅ UPDATED
                                </span>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <!-- コミットハッシュ -->
                      <tr>
                        <td style="padding: 20px 24px;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td style="text-align: center;">
                                <div style="margin-bottom: 6px; font-size: 11px; color: #94a3b8;
                                            text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;">
                                  Before
                                </div>
                                <div style="display: inline-block; background: #f1f5f9; color: #475569;
                                            font-family: 'Courier New', monospace; font-size: 20px;
                                            font-weight: 700; padding: 10px 20px; border-radius: 10px;
                                            letter-spacing: 0.05em; border: 1.5px solid #e2e8f0;">
                                  ${oldC}
                                </div>
                              </td>
                              <td style="text-align: center; width: 60px;">
                                <div style="font-size: 28px; color: #cbd5e1;">→</div>
                              </td>
                              <td style="text-align: center;">
                                <div style="margin-bottom: 6px; font-size: 11px; color: #94a3b8;
                                            text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;">
                                  After
                                </div>
                                <div style="display: inline-block; background: linear-gradient(135deg, #dcfce7, #bbf7d0);
                                             color: #15803d; font-family: 'Courier New', monospace;
                                             font-size: 20px; font-weight: 700; padding: 10px 20px;
                                             border-radius: 10px; letter-spacing: 0.05em;
                                             border: 1.5px solid #86efac;">
                                  ${newC}
                                </div>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <!-- ボタン -->
                      <tr>
                        <td style="padding: 0 24px 20px 24px; text-align: right;">
                          <a href="https://github.com/${context.repo.owner}/${path}/tree/${newC}"
                             style="display: inline-block; background: linear-gradient(135deg, #3b82f6, #2563eb);
                                    color: #ffffff; font-size: 13px; font-weight: 700; text-decoration: none;
                                    padding: 10px 22px; border-radius: 10px; letter-spacing: 0.03em;
                                    box-shadow: 0 2px 8px rgba(37,99,235,0.3);">
                            🔗 GitHub で確認する
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              `;
            }).join("");

            const html = `
              <!DOCTYPE html>
              <html lang="ja">
              <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
              </head>
              <body style="margin:0; padding:0; background:#f0f4f8;">
                <table width="100%" cellpadding="0" cellspacing="0" border="0"
                       style="background: #f0f4f8; padding: 40px 16px;">
                  <tr>
                    <td align="center">
                      <table width="620" cellpadding="0" cellspacing="0" border="0"
                             style="max-width: 620px; width: 100%;">

                        <!-- ═══ HEADER ═══ -->
                        <tr>
                          <td style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
                                     border-radius: 20px 20px 0 0; padding: 36px 40px 32px; text-align: center;">
                            <div style="font-size: 13px; letter-spacing: 0.16em; color: #64748b;
                                        text-transform: uppercase; font-weight: 600; margin-bottom: 12px;">
                              GitHub Actions · Auto Report
                            </div>
                            <div style="font-size: 30px; font-weight: 800; color: #f8fafc;
                                        letter-spacing: -0.02em; margin-bottom: 10px;">
                              🔄 Submodule Update
                            </div>
                            <div style="font-size: 14px; color: #64748b;">
                              ${today} &nbsp;·&nbsp; ${timeNow} JST
                            </div>
                          </td>
                        </tr>

                        <!-- ═══ STATUS BANNER ═══ -->
                        <tr>
                          <td style="background: ${hasChanges
                            ? "linear-gradient(135deg, #16a34a, #22c55e)"
                            : "linear-gradient(135deg, #475569, #64748b)"};
                                     padding: 16px 40px; text-align: center;">
                            <span style="font-size: 16px; font-weight: 800; color: #ffffff; letter-spacing: 0.04em;">
                              ${hasChanges
                                ? `✅ &nbsp;${entries.length} 件のサブモジュールが更新されました`
                                : "✨ &nbsp;変更はありませんでした"}
                            </span>
                          </td>
                        </tr>

                        <!-- ═══ BODY ═══ -->
                        <tr>
                          <td style="background: #f8fafc; border: 1.5px solid #e2e8f0;
                                     border-top: none; border-radius: 0 0 20px 20px; padding: 28px 32px;">

                            ${hasChanges ? `
                              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                ${cards}
                              </table>
                            ` : `
                              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                  <td style="text-align: center; padding: 40px 0;">
                                    <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
                                    <div style="font-size: 18px; font-weight: 700; color: #1e293b;
                                                margin-bottom: 8px;">
                                      すべて最新の状態です
                                    </div>
                                    <div style="font-size: 14px; color: #64748b;">
                                      サブモジュールに更新はありませんでした
                                    </div>
                                  </td>
                                </tr>
                              </table>
                            `}

                            <!-- FOOTER -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                                   style="border-top: 1.5px solid #e2e8f0; margin-top: 8px; padding-top: 20px;">
                              <tr>
                                <td style="font-size: 12px; color: #94a3b8;">
                                  🤖 Sent by GitHub Actions
                                </td>
                                <td style="text-align: right; font-size: 12px; color: #94a3b8;">
                                  スケジュール: 3日ごと
                                </td>
                              </tr>
                            </table>

                          </td>
                        </tr>

                      </table>
                    </td>
                  </tr>
                </table>
              </body>
              </html>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: `"GitHub Actions 🤖" <${process.env.GMAIL_USER}>`,
              to: process.env.GMAIL_USER,
              subject: `🔄 Submodule Update · ${entries.length}件更新 · ${today}`,
              html
            });

            console.log("Mail sent!");
