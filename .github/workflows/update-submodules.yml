name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      # 📌 実在submoduleだけ取得（これが重要）
      - name: Capture submodule state (before)
        run: git submodule status --recursive > before.txt

      - name: Update again (safe refresh)
        run: git submodule update --init --recursive --remote

      - name: Capture submodule state (after)
        run: git submodule status --recursive > after.txt

      # 📌 差分生成（正確版）
      - name: Generate diff report
        id: report
        shell: bash
        run: |
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT

          awk '
          FNR==NR {before[$2]=$1; next}
          {
            path=$2
            old=before[path]
            new=$1

            if (old != "" && old != new) {
              old7=substr(old,1,7)
              new7=substr(new,1,7)

              echo "<div style=\"background:#fff;padding:14px;margin:10px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.08)\">"
              echo "📦 <b>" path "</b><br/>"
              echo "🔄 <code>" old7 "</code> → <code>" new7 "</code><br/>"
              echo "</div>"
            }
          }' before.txt after.txt >> $GITHUB_OUTPUT

          echo "EOF" >> $GITHUB_OUTPUT

      # 📌 変更有無判定（シンプルで安全）
      - name: Detect changes
        id: changes
        run: |
          if grep -q "→" <<< "${{ steps.report.outputs.REPORT }}"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 📌 commit & push（変更時のみ）
      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "🔄 Auto update submodules"
          git push

      # 📌 メール送信（完成UI）
      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const hasChanges = process.env.REPORT && process.env.REPORT.includes("→");

            const html = `
            <div style="font-family:Arial;background:#f6f7fb;padding:20px">
              <div style="max-width:720px;margin:auto">

                <h2 style="text-align:center">🔄 Submodule Update Report</h2>

                <div style="background:#fff;padding:16px;border-radius:10px;margin:15px 0;box-shadow:0 2px 6px rgba(0,0,0,0.08)">
                  <p>🚦 Status:
                    <b style="color:${hasChanges ? '#2ecc71' : '#999'}">
                      ${hasChanges ? 'UPDATED' : 'NO CHANGES'}
                    </b>
                  </p>

                  <p>
                    🔗 <a href="https://github.com/${context.repo.owner}/${context.repo.repo}">
                      Open Blender-Works Repository
                    </a>
                  </p>

                  <p>
                    ⚙️ <a href="https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}">
                      Open Workflow Run
                    </a>
                  </p>
                </div>

                <h3>📦 Submodules</h3>

                ${hasChanges ? process.env.REPORT : `
                  <div style="background:#fff;padding:14px;border-radius:10px;text-align:center;color:#999">
                    ✨ No updates detected
                  </div>
                `}

                <p style="text-align:center;color:#aaa;font-size:12px;margin-top:30px">
                  GitHub Actions Auto Dashboard
                </p>

              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "🔄 Submodule Update Report",
              html
            });

            console.log("Mail sent!");
