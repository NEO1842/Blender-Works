name: Update Submodules

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture before state
        run: git submodule status --recursive > before.txt

      - name: Update submodules
        run: git submodule update --init --recursive --remote

      - name: Capture after state
        run: git submodule status --recursive > after.txt

      - name: Generate report data
        id: report
        shell: bash
        run: |
          REPORT=""

          while read -r oldLine && read -r newLine <&3; do
            oldCommit=$(echo "$oldLine" | awk '{print $1}' | tr -d '+')
            newCommit=$(echo "$newLine" | awk '{print $1}' | tr -d '+')
            path=$(echo "$newLine" | awk '{print $2}')

            if [[ "$oldCommit" != "$newCommit" && "$oldCommit" != "" ]]; then
              REPORT="${REPORT}${path}|${oldCommit:0:7}|${newCommit:0:7};"
            fi
          done < before.txt 3< after.txt

          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [[ -n "${{ steps.report.outputs.REPORT }}" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "🔄 Auto update submodules"
          git push

      - name: Send mail
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          REPORT: ${{ steps.report.outputs.REPORT }}
        with:
          script: |
            const nodemailer = require("nodemailer");

            const hasChanges = (process.env.REPORT || "").trim().length > 0;

            const entries = (process.env.REPORT || "").split(";").filter(Boolean);

            const items = entries.map(line => {
              const [path, oldC, newC] = line.split("|");
              return `
                <div style="border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:12px;">
                  <div style="padding:12px 16px;background:#f8f8f8;border-bottom:1px solid #e8e8e8;display:table;width:100%;box-sizing:border-box;">
                    <span style="display:table-cell;font-family:monospace;font-size:14px;font-weight:700;color:#1a1a2e;">
                      📦 ${path}
                    </span>
                    <span style="display:table-cell;text-align:right;">
                      <span style="font-size:11px;background:#e6f1fb;color:#185fa5;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:0.04em;">
                        UPDATED
                      </span>
                    </span>
                  </div>
                  <div style="padding:14px 16px;background:#ffffff;display:table;width:100%;box-sizing:border-box;">
                    <span style="display:table-cell;vertical-align:middle;">
                      <span style="font-family:monospace;font-size:13px;background:#f4f4f4;color:#666666;padding:3px 10px;border-radius:6px;">
                        ${oldC}
                      </span>
                      <span style="color:#aaaaaa;font-size:14px;padding:0 6px;">→</span>
                      <span style="font-family:monospace;font-size:13px;background:#eaf3de;color:#27500a;padding:3px 10px;border-radius:6px;font-weight:700;">
                        ${newC}
                      </span>
                    </span>
                    <span style="display:table-cell;text-align:right;vertical-align:middle;">
                      <a href="https://github.com/${context.repo.owner}/${path}/tree/${newC}"
                         style="font-size:12px;color:#185fa5;text-decoration:none;padding:5px 12px;border:1px solid #b5d4f4;border-radius:8px;white-space:nowrap;">
                        🔗 Open
                      </a>
                    </span>
                  </div>
                </div>
              `;
            }).join("");

            const today = new Date().toISOString().slice(0, 10);

            const html = `
              <!DOCTYPE html>
              <html lang="ja">
              <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
              <body style="margin:0;padding:0;background:#f0f2f5;">
                <div style="background:#f0f2f5;padding:32px 16px;font-family:Arial,sans-serif;">
                  <div style="max-width:600px;margin:0 auto;">

                    <!-- Header -->
                    <div style="background:#1a1a2e;border-radius:16px 16px 0 0;padding:28px 32px 20px;text-align:center;">
                      <div style="font-size:11px;letter-spacing:0.12em;color:#8888aa;text-transform:uppercase;margin-bottom:8px;">
                        GitHub Actions
                      </div>
                      <div style="font-size:22px;font-weight:700;color:#ffffff;">
                        Submodule Update Report
                      </div>
                      <div style="margin-top:8px;font-size:12px;color:#8888aa;">
                        ${today} · auto triggered by schedule
                      </div>
                    </div>

                    <!-- Status Banner -->
                    <div style="background:${hasChanges ? '#12b76a' : '#888888'};padding:10px 32px;text-align:center;">
                      <span style="font-size:14px;font-weight:700;color:#ffffff;letter-spacing:0.04em;">
                        ${hasChanges ? `✅ ${entries.length} submodule(s) updated` : '✨ No changes detected'}
                      </span>
                    </div>

                    <!-- Body -->
                    <div style="background:#ffffff;border:1px solid #e8e8e8;border-top:none;border-radius:0 0 16px 16px;padding:24px 28px;">

                      ${hasChanges ? items : `
                        <div style="text-align:center;padding:24px 0;color:#888888;font-size:14px;">
                          All submodules are already up to date.
                        </div>
                      `}

                      <!-- Footer -->
                      <div style="border-top:1px solid #eeeeee;margin-top:8px;padding-top:14px;display:table;width:100%;box-sizing:border-box;">
                        <span style="display:table-cell;font-size:11px;color:#aaaaaa;">Sent by GitHub Actions</span>
                        <span style="display:table-cell;text-align:right;font-size:11px;color:#aaaaaa;">Auto update · every 3 days</span>
                      </div>

                    </div>
                  </div>
                </div>
              </body>
              </html>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: `🔄 Submodule Update Report · ${today}`,
              html
            });

            console.log("Mail sent!");
